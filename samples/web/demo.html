<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>plinth-telemetry demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #111; color: #eee; display: flex; flex-direction: column; height: 100vh; }
    header { padding: 12px 16px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 1rem; font-weight: 600; color: #aaa; }
    #url-input { flex: 1; padding: 6px 10px; border-radius: 4px; border: 1px solid #444; background: #222; color: #eee; font-size: 0.85rem; }
    #load-btn { padding: 6px 16px; border-radius: 4px; border: none; background: #2563eb; color: #fff; font-size: 0.85rem; cursor: pointer; }
    #load-btn:hover { background: #1d4ed8; }
    main { display: flex; flex: 1; overflow: hidden; }
    .player-panel { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; padding: 16px; }
    video { max-width: 100%; max-height: 100%; border-radius: 4px; }
    .log-panel { width: 380px; border-left: 1px solid #333; display: flex; flex-direction: column; }
    .log-panel-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid #333; }
    .log-panel h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #666; }
    #clear-log, #copy-log { background: none; border: none; cursor: pointer; color: #4b5563; padding: 0; line-height: 1; }
    #clear-log:hover, #copy-log:hover { color: #9ca3af; }
    #log { flex: 1; overflow-y: auto; padding: 8px 0; list-style: none; font-family: monospace; font-size: 0.72rem; }
    #log li { padding: 3px 14px; border-bottom: 1px solid #1a1a1a; color: #9ca3af; word-break: break-all; }
    #log li .ts { color: #4b5563; margin-right: 6px; }
    #log li .msg { color: #d1fae5; }
    #versions { padding: 4px 14px; font-family: monospace; font-size: 0.65rem; color: #4b5563; border-bottom: 1px solid #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body>
  <header>
    <h1 id="player-label">plinth-telemetry</h1>
    <input id="url-input" type="text" spellcheck="false" />
    <label style="display:flex;align-items:center;gap:5px;font-size:0.8rem;color:#888;white-space:nowrap;cursor:pointer;">
      <input id="autostart" type="checkbox" checked />
      Autostart
    </label>
    <button id="load-btn">Load</button>
  </header>
  <main>
    <div class="player-panel">
      <video id="video" controls></video>
    </div>
    <div class="log-panel">
      <div class="log-panel-header">
        <h2>Event log</h2>
        <div style="display:flex;gap:8px;align-items:center;">
        <button id="copy-log" title="Copy log">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
        <button id="clear-log" title="Clear log">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
        </div>
      </div>
      <div id="versions"></div>
      <ul id="log"></ul>
    </div>
  </main>
  <script>
    const players = {
      hlsjs:  { label: 'plinth-telemetry — HLS.js',  url: 'https://stream.mux.com/GWPDeDbc011cmHckB4h4l87OofuZPGPKl.m3u8' },
      shaka:  { label: 'plinth-telemetry — Shaka',   url: 'https://dash.akamaized.net/akamai/bbb_30fps/bbb_30fps.mpd' },
      dashjs: { label: 'plinth-telemetry — dash.js', url: 'https://dash.akamaized.net/akamai/bbb_30fps/bbb_30fps.mpd' },
    };
    const key = location.pathname.slice(1);
    const cfg = players[key] || players.hlsjs;
    document.title = cfg.label;
    document.getElementById('player-label').textContent = cfg.label;
    document.getElementById('url-input').value = cfg.url;
    const s = document.createElement('script');
    s.type = 'module';
    s.src = './' + key + '-main.js';
    document.head.appendChild(s);
  </script>
</body>
</html>
