<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>plinth-video demos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #111; color: #eee; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .container { display: flex; flex-direction: column; gap: 24px; align-items: center; }
    h1 { font-size: 1.1rem; font-weight: 600; color: #aaa; letter-spacing: 0.04em; }
    .demos { display: flex; gap: 16px; }
    a.demo-card { display: flex; flex-direction: column; gap: 8px; align-items: center; justify-content: center; width: 160px; height: 100px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #eee; text-decoration: none; transition: border-color 0.15s, background 0.15s; }
    a.demo-card:hover { border-color: #2563eb; background: #1e2a3a; }
    a.demo-card .label { font-size: 1rem; font-weight: 600; }
    a.demo-card .sublabel { font-size: 0.72rem; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <h1>plinth-video</h1>
    <div class="demos">
      <a class="demo-card" href="/hlsjs">
        <span class="label">Hls.js</span>
        <span class="sublabel">HLS · web</span>
      </a>
      <a class="demo-card" href="/shaka">
        <span class="label">Shaka</span>
        <span class="sublabel">DASH / HLS · web</span>
      </a>
      <a class="demo-card" href="/dashjs">
        <span class="label">dash.js</span>
        <span class="sublabel">DASH · web</span>
      </a>
    </div>
  </div>
</body>
</html>
