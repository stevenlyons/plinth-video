<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>plinth-video demo (dash.js)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #111; color: #eee; display: flex; flex-direction: column; height: 100vh; }
    header { padding: 12px 16px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 1rem; font-weight: 600; color: #aaa; }
    #url-input { flex: 1; padding: 6px 10px; border-radius: 4px; border: 1px solid #444; background: #222; color: #eee; font-size: 0.85rem; }
    #load-btn { padding: 6px 16px; border-radius: 4px; border: none; background: #2563eb; color: #fff; font-size: 0.85rem; cursor: pointer; }
    #load-btn:hover { background: #1d4ed8; }
    main { display: flex; flex: 1; overflow: hidden; }
    .player-panel { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; padding: 16px; }
    video { max-width: 100%; max-height: 100%; border-radius: 4px; }
    .log-panel { width: 380px; border-left: 1px solid #333; display: flex; flex-direction: column; }
    .log-panel h2 { padding: 10px 14px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #666; border-bottom: 1px solid #333; }
    #log { flex: 1; overflow-y: auto; padding: 8px 0; list-style: none; font-family: monospace; font-size: 0.72rem; }
    #log li { padding: 3px 14px; border-bottom: 1px solid #1a1a1a; color: #9ca3af; word-break: break-all; }
    #log li .ts { color: #4b5563; margin-right: 6px; }
    #log li .msg { color: #d1fae5; }
  </style>
</head>
<body>
  <header>
    <h1>plinth-video (dash.js)</h1>
    <input id="url-input" type="text" value="https://dash.akamaized.net/akamai/bbb_30fps/bbb_30fps.mpd" spellcheck="false" />
    <button id="load-btn">Load</button>
  </header>
  <main>
    <div class="player-panel">
      <video id="video" controls></video>
    </div>
    <div class="log-panel">
      <h2>Event log</h2>
      <ul id="log"></ul>
    </div>
  </main>
  <script type="module" src="./dashjs-main.js"></script>
</body>
</html>
